{% extends 'base.html' %} {% load static %} {% block content %}
<div class="content">
  <div class="container-fluid">
    <h4 class="page-title">Colleges</h4>
    <div class="row">
      <div class="col-md-12">
        <div class="card">
          <div class="card-header">
            <div class="card-title">List of Colleges</div>
            <div class="card-category">Page Subtitle</div>
          </div>
          <br />
          <div class="col-md-12 row">
            <div class="col-md-6">
              <form class="navbar-left navbar-form nav-search mr-md-3" action="{% url 'college-list' %}" method="get">
                  <div class="input-group">
                      <input type="text" name="q" placeholder="Search ..." class="form-control" value="{{ request.GET.q }}">
                      <div class="input-group-append">
                          <span class="input-group-text"><i class="la la-search search-icon"></i></span>
                      </div>
                  </div>
              </form>
            </div>
            <div class="col-md-6">
              <div class="pull-right">
                <a href="{% url 'college-add' %}" class="btn btn-success btn-rounded">Add College</a>
              </div>
            </div>
          </div>
          <div class="card-body">
            <div class="col-md-12">
              <form method="get" class="row g-2 align-items-center">
                <div class="col-auto">
                  <label for="collegeSort" class="col-form-label">Sort by</label>
                </div>
                <div class="col-auto">
                  <select class="form-control form-control-sm" id="collegeSort" name="sort_by">
                    <option value="college_name" {% if request.GET.sort_by == "college_name" %}selected{% endif %}>College Name</option>
                  </select>
                </div>
                <div class="col-auto">
                  <button type="submit" class="btn btn-primary btn-sm btn-rounded">Sort</button>
                </div>
              </form>
            </div>
            <table class="table table-striped mt-3">
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody>
                {% for object in object_list %}
                <tr>
                  <td>{{ object.college_name }}</td>
                  <td>
                    <a href="{% url 'college-update' object.id %}">Edit</a>
                    <a href="{% url 'college-delete' object.id %}" class="text-danger">Delete</a>
                  </td>
                </tr>
                {% empty %}
                <tr><td colspan="3" style="text-align:center">No Records Found</td></tr>
                {% endfor %}
              </tbody>
            </table>
            {% include 'includes/pagination.html' %}
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
